[pytest]
# Pytest configuration for AI Crypto Trader

# Test file patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings
addopts = -v --tb=short --strict-markers -ra

# Async settings
asyncio_mode = auto

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require Redis/APIs)
    slow: Slow tests (backtesting, large datasets)
    security: Security-related tests

# Timeout for individual tests (in seconds)
timeout = 30

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage settings (if pytest-cov is installed)
# Run with: pytest --cov=services --cov-report=html

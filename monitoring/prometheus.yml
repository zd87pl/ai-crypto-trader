global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      scheme: http
      timeout: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "market-monitor"
    static_configs:
      - targets: ["market-monitor:8001"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: "social-monitor"
    static_configs:
      - targets: ["social-monitor:8005"]
    metrics_path: /metrics

  - job_name: "ai-analyzer"
    static_configs:
      - targets: ["ai-analyzer:8003"]
    metrics_path: /metrics

  - job_name: "trade-executor"
    static_configs:
      - targets: ["trade-executor:8002"]
    metrics_path: /metrics

  - job_name: "strategy-evolution"
    static_configs:
      - targets: ["strategy-evolution:8004"]
    metrics_path: /metrics

  - job_name: "dashboard"
    static_configs:
      - targets: ["dashboard:8050"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    metrics_path: /metrics

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
